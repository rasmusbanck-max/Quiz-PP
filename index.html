<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ämnen omkring oss</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1rem}
.app{max-width:580px;margin:0 auto;padding:1rem 0}
.screen{display:none}.screen.active{display:block}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:10px}
.muted{color:#888;font-size:14px}
.label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
h1{font-size:26px;font-weight:600;margin-bottom:.25rem}
h2{font-size:20px;font-weight:600;margin-bottom:.5rem}
h3{font-size:17px;font-weight:600;margin-bottom:.75rem;line-height:1.4}
input,textarea{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;background:white;color:#1a1a1a}
input:focus,textarea:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:80px}
button{padding:11px 20px;border-radius:8px;border:1px solid #ddd;background:white;font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;color:#1a1a1a}
button:hover{background:#f0f0ee}
button.primary{background:#1a1a1a;color:white;border-color:#1a1a1a}
button.primary:hover{background:#333}
button:disabled{opacity:.4;cursor:not-allowed}
.progress{height:3px;background:#eee;border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s ease}
.option{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;background:white;border:1px solid #ddd;border-radius:10px;cursor:pointer;font-size:15px;font-family:inherit;transition:all .15s}
.option:hover{border-color:#bbb;background:#fafafa}
.option .dot{width:18px;height:18px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0;transition:all .15s;background:transparent}
.option.selected{border-color:#3b82f6;background:#eff6ff}
.option.selected .dot{background:#3b82f6;border-color:#3b82f6}
.option.correct{border-color:#16a34a;background:#f0fdf4}
.option.correct .dot{background:#16a34a;border-color:#16a34a}
.option.wrong{border-color:#dc2626;background:#fef2f2}
.option.wrong .dot{background:#dc2626;border-color:#dc2626}
.feedback{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:1rem;display:none;line-height:1.5}
.feedback.show{display:block}
.feedback.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.feedback.bad{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.stab{padding:7px 14px;border-radius:8px;border:1px solid #ddd;font-size:13px;cursor:pointer;background:white;font-family:inherit;color:#666;transition:all .15s}
.stab.active{background:#1a1a1a;color:white;border-color:#1a1a1a}
.flashcard{perspective:600px;height:150px;cursor:pointer;margin-bottom:1rem}
.flashcard-inner{width:100%;height:100%;transition:transform .4s;transform-style:preserve-3d;position:relative}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid #e8e8e4;padding:1.25rem;text-align:center}
.fc-front{background:white;font-size:20px;font-weight:600}
.fc-back{background:#f5f5f3;transform:rotateY(180deg);font-size:14px;color:#555;line-height:1.5}
.match-item{padding:10px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:14px;transition:all .15s;margin-bottom:6px;background:white}
.match-item:hover{border-color:#bbb;background:#fafafa}
.match-item.sel{border-color:#3b82f6;background:#eff6ff;color:#1d4ed8}
.match-item.matched{border-color:#16a34a;background:#f0fdf4;color:#166534;cursor:default;pointer-events:none}
.match-item.wrong-flash{border-color:#dc2626;background:#fef2f2}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.step-pill{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid #e8e8e4;color:#888;background:white;display:inline-block}
.step-pill.done{background:#dcfce7;color:#166534;border-color:#bbf7d0}
.step-pill.active{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;font-weight:500}
</style>
</head>
<body>
<div class="app">

<div id="enterScreen" class="screen active">
  <div style="text-align:center;padding:2.5rem 0 1.5rem">
    <div class="label" style="text-align:center;margin-bottom:.5rem">Naturorienterande ämnen · Åk 6</div>
    <h1 style="margin-bottom:.25rem">Ämnen omkring oss</h1>
    <p class="muted" style="margin-bottom:2rem">Ange ditt kodord för att komma igång</p>
    <div style="max-width:280px;margin:0 auto">
      <input id="codeInput" type="text" placeholder="Ditt kodord" style="text-align:center;font-size:18px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px" maxlength="20" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')enterApp()">
      <div id="codeErr" style="color:#dc2626;font-size:13px;min-height:18px;margin-bottom:10px;text-align:left"></div>
      <button class="primary" onclick="enterApp()" style="width:100%">Fortsätt</button>
    </div>
  </div>
</div>

<div id="hubScreen" class="screen">
  <div style="margin-bottom:1.25rem">
    <div class="label">Välkommen, <span id="hubName"></span></div>
    <h2>Vad ska vi göra?</h2>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap" id="progressPills"></div>
  <div id="hubButtons"></div>
</div>

<div id="quizScreen" class="screen">
  <div class="label" id="qSubject"></div>
  <div class="progress" style="margin-top:.5rem"><div class="progress-fill" id="qProgress"></div></div>
  <div class="muted" id="qNum" style="margin-bottom:.75rem"></div>
  <h3 id="qText"></h3>
  <div id="qArea"></div>
  <div class="feedback" id="qFeedback"></div>
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
    <button class="primary" id="submitBtn" onclick="submitQ()">Svara</button>
    <button class="primary" id="nextBtn" style="display:none" onclick="nextQ()">Nästa</button>
  </div>
</div>

<div id="practiceScreen" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div>
      <div class="label" id="practiceLabel"></div>
      <div class="muted">Välj ett övningsläge</div>
    </div>
    <button onclick="goHub()" style="font-size:13px">Tillbaka</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap">
    <button class="stab active" onclick="showPractice('flash')">Flashcards</button>
    <button class="stab" onclick="showPractice('match')">Matchning</button>
    <button class="stab" onclick="showPractice('retry')">Öva på felen</button>
  </div>
  <div id="practiceArea"></div>
</div>

<div id="survivalScreen" class="screen">
  <div id="svContent"></div>
</div>

</div>
<script>
const QUIZZES={
  MATERIA:{
    title:"Materiens uppbyggnad",subject:"NO · Åk 6",
    questions:[
      {type:"multi",text:"Vad avgör vilket grundämne en atom tillhör?",options:["Antalet neutroner","Antalet elektroner","Antalet protoner","Atomens storlek"],correct:2,feedback_ok:"Rätt! Antalet protoner är unikt för varje grundämne.",feedback_bad:"Det är antalet protoner i kärnan som avgör vilket grundämne det är."},
      {type:"multi",text:"Vad är en molekyl?",options:["En enskild atom","En grupp atomer som sitter ihop kemiskt","En atom med extra elektroner","Ett grundämne i fast form"],correct:1,feedback_ok:"Rätt! En molekyl är atomer som bundits samman kemiskt.",feedback_bad:"En molekyl är en grupp atomer som sitter ihop kemiskt, t.ex. H₂O eller CO₂."},
      {type:"multi",text:"Vilket av dessa är ett grundämne?",options:["Vatten (H₂O)","Koldioxid (CO₂)","Salt (NaCl)","Syrgas (O₂)"],correct:3,feedback_ok:"Rätt! Syrgas (O₂) innehåller bara syreatomer.",feedback_bad:"Ett grundämne innehåller bara en sorts atomer. Syrgas (O₂) är bara syreatomer."},
      {type:"multi",text:"Vad skiljer en kemisk förening från ett grundämne?",options:["En kemisk förening har fler atomer","En kemisk förening innehåller atomer av olika grundämnen","En kemisk förening är alltid flytande","En kemisk förening kan inte delas upp"],correct:1,feedback_ok:"Rätt! En kemisk förening innehåller atomer av minst två olika grundämnen.",feedback_bad:"En kemisk förening innehåller atomer av olika grundämnen, t.ex. H₂O (väte + syre)."},
      {type:"multi",text:"Vad innehåller en atoms kärna?",options:["Elektroner och protoner","Protoner och neutroner","Neutroner och elektroner","Bara protoner"],correct:1,feedback_ok:"Rätt! Kärnan innehåller protoner och neutroner. Elektronerna rör sig utanför.",feedback_bad:"Atomkärnan innehåller protoner och neutroner. Elektronerna finns utanför kärnan."},
      {type:"open",text:"Förklara skillnaden mellan ett grundämne och en kemisk förening. Ge ett exempel på vardera.",facit:"Grundämne: innehåller bara en sorts atomer, t.ex. syrgas (O₂) eller järn (Fe). Kemisk förening: innehåller atomer av olika grundämnen, t.ex. vatten (H₂O) eller koldioxid (CO₂)."}
    ],
    flashcards:[
      {term:"Atom",def:"Den minsta beståndsdelen av ett ämne. Kan inte delas kemiskt i något enklare."},
      {term:"Molekyl",def:"En grupp atomer som sitter ihop kemiskt. Ex: H₂O, CO₂, O₂."},
      {term:"Grundämne",def:"Innehåller bara en sorts atomer. Ex: syrgas (O₂), järn (Fe), guld (Au)."},
      {term:"Kemisk förening",def:"Innehåller atomer av olika grundämnen. Ex: vatten (H₂O), salt (NaCl)."},
      {term:"Proton",def:"Positivt laddad partikel i atomkärnan. Antalet protoner avgör grundämnet."},
      {term:"Elektron",def:"Negativt laddad partikel utanför atomkärnan. Påverkar hur atomer binds."},
      {term:"Partikelmodellen",def:"Vi ritar cirklar för atomer. Samma sorts cirklar = samma grundämne."}
    ],
    matching:[
      {term:"H₂O",def:"Vatten – kemisk förening"},
      {term:"O₂",def:"Syrgas – grundämne"},
      {term:"CO₂",def:"Koldioxid – kemisk förening"},
      {term:"Fe",def:"Järn – grundämne"},
      {term:"NaCl",def:"Salt – kemisk förening"}
    ]
  },
  KEMI:{
    title:"Kemiska reaktioner och kolets kretslopp",subject:"NO · Åk 6",
    questions:[
      {type:"multi",text:"Vad händer med atomerna vid en kemisk reaktion?",options:["De försvinner","De ordnas om och bildar nya ämnen","De delas i hälften","De byter antal protoner"],correct:1,feedback_ok:"Rätt! Atomerna ordnas om men försvinner aldrig.",feedback_bad:"Vid en kemisk reaktion ordnas atomerna om och bildar nya ämnen, men ingen atom försvinner."},
      {type:"multi",text:"Vad behöver en växt för att utföra fotosyntes?",options:["CO₂, H₂O och ljus","O₂, socker och ljus","CO₂, O₂ och värme","H₂O, socker och mörker"],correct:0,feedback_ok:"Rätt! Fotosyntes kräver koldioxid, vatten och ljusenergi.",feedback_bad:"Fotosyntes kräver koldioxid (CO₂), vatten (H₂O) och ljus – och bildar socker och syre."},
      {type:"multi",text:"Vad bildas vid förbränning?",options:["Bara värme","Syrgas och vatten","Koldioxid och vatten","Socker och syre"],correct:2,feedback_ok:"Rätt! Förbränning ger koldioxid, vatten och energi.",feedback_bad:"Vid förbränning bildas koldioxid (CO₂) och vatten (H₂O), plus energi."},
      {type:"multi",text:"Varför är fossila bränslen ett klimatproblem?",options:["De tar slut snabbt","De frigör gammalt kol som länge legat bundet, vilket ökar CO₂ snabbt","De producerar inget vatten","De innehåller inga atomer"],correct:1,feedback_ok:"Rätt! Fossila bränslen frigör kol som legat bundet i miljontals år.",feedback_bad:"Fossila bränslen frigör gammalt bundet kol på kort tid, vilket snabbt ökar CO₂ i atmosfären."},
      {type:"multi",text:"Vad skiljer förnybart från fossilt bränsle?",options:["Förnybara ger mer energi","Fossila ingår i ett pågående kretslopp","Förnybara ingår i ett pågående kretslopp, fossila frigör gammalt kol","De är kemiskt identiska"],correct:2,feedback_ok:"Rätt! Förnybara bränslen ingår i ett levande kretslopp.",feedback_bad:"Förnybara bränslen (ved, biogas) ingår i ett levande kretslopp. Fossila frigör gammalt lagrat kol."},
      {type:"open",text:"Beskriv kolets kretslopp. Hur rör sig kolet mellan luft, levande organismer och mark?",facit:"Växter tar upp CO₂ via fotosyntes. Djur äter växter och för kolet vidare. När organismer dör bryts de ned och CO₂ frigörs till luften. Havet tar också upp och frigör koldioxid. Samma kolatomer cirkulerar om och om igen."}
    ],
    flashcards:[
      {term:"Kemisk reaktion",def:"Atomerna ordnas om och bildar nya ämnen. Ingen atom försvinner."},
      {term:"Fotosyntes",def:"Växter tar upp CO₂ + H₂O + ljus och bildar socker + O₂. Lagrar energi."},
      {term:"Förbränning",def:"Bränsle + O₂ → CO₂ + H₂O + energi. Frigör energi."},
      {term:"Kolets kretslopp",def:"Kolatomer cirkulerar mellan luft, levande organismer, hav och mark."},
      {term:"Fossila bränslen",def:"Kol, olja, naturgas. Bildades under miljontals år. Frigör gammalt kol vid förbränning."},
      {term:"Förnybara bränslen",def:"Biobränsle, ved, biogas. Ingår i ett pågående kretslopp."},
      {term:"Växthuseffekten",def:"Atmosfären fångar värme. Förstärks när CO₂ ökar via fossila bränslen."}
    ],
    matching:[
      {term:"Fotosyntes",def:"CO₂ + H₂O + ljus → socker + O₂"},
      {term:"Förbränning",def:"Bränsle + O₂ → CO₂ + H₂O + energi"},
      {term:"Fossila bränslen",def:"Kol, olja, naturgas"},
      {term:"Förnybara bränslen",def:"Ved, biogas, biobränsle"},
      {term:"Kolets kretslopp",def:"Kol cirkulerar mellan luft, mark och organismer"}
    ]
  },
  RÅVAROR:{
    title:"Råvaror och återvinning",subject:"NO · Åk 6",
    questions:[
      {type:"multi",text:"Vad är malm?",options:["En sorts metall","En bergart med tillräckligt mycket mineral för att det lönar sig att bryta","Ett naturligt mineral","En legering av järn och kol"],correct:1,feedback_ok:"Rätt! Malm är bergart med tillräckligt hög halt av mineral.",feedback_bad:"Malm är bergart som innehåller tillräckligt mycket mineral för att det är lönsamt att utvinna metall."},
      {type:"multi",text:"Vad är en legering?",options:["Ett grundämne med hög densitet","En kemisk förening av syre och metall","En blandning av metaller för bättre egenskaper","Ett mineral som finns i berg"],correct:2,feedback_ok:"Rätt! En legering är en blandning av metaller, t.ex. stål (järn + kol).",feedback_bad:"En legering är en blandning av metaller för bättre egenskaper. Ex: stål = järn + kol."},
      {type:"multi",text:"Vad är skillnaden mellan återvinning och återanvändning?",options:["Det är samma sak","Återvinning bearbetar materialet om, återanvändning använder föremålet igen utan omvandling","Återanvändning kräver mer energi","Återvinning är bara möjligt för glas"],correct:1,feedback_ok:"Rätt! Återvinning omvandlar materialet, återanvändning använder föremålet direkt igen.",feedback_bad:"Återvinning = materialet bearbetas om. Återanvändning = föremålet används igen direkt utan omvandling."},
      {type:"multi",text:"Varför är återvinning av aluminium bra för klimatet?",options:["Aluminium är det vanligaste grundämnet","Återvinning kräver bara ca 5% av energin jämfört med ny utvinning","Aluminium kan återvinnas oändligt","Aluminium finns inte i naturen"],correct:1,feedback_ok:"Rätt! Återvinning av aluminium kräver bara ~5% av energin jämfört med ny utvinning.",feedback_bad:"Återvinning av aluminium kräver bara ungefär 5% av energin jämfört med att utvinna ny aluminium ur malm."},
      {type:"multi",text:"Vilket av dessa är en förnybar råvara?",options:["Järnmalm","Olja","Trä","Koppar"],correct:2,feedback_ok:"Rätt! Trä är förnybart – träd kan växa tillbaka.",feedback_bad:"Trä är förnybart eftersom träd kan växa tillbaka inom rimlig tid."},
      {type:"open",text:"Förklara kedjan från berg till metall: mineral → malm → metall → legering.",facit:"Mineral är naturliga ämnen (t.ex. järnoxid). Malm är bergart med tillräckligt mycket mineral för att brytas. Metall utvinns ur malm genom smältning (t.ex. järn, koppar). Legering är en blandning av metaller för bättre egenskaper (t.ex. stål = järn + kol)."}
    ],
    flashcards:[
      {term:"Mineral",def:"Naturligt ämne med bestämd kemisk sammansättning. Ex: kvarts, järnoxid."},
      {term:"Malm",def:"Bergart med tillräckligt hög halt av mineral för att det lönar sig att bryta."},
      {term:"Legering",def:"Blandning av metaller för bättre egenskaper. Ex: stål = järn + kol."},
      {term:"Förnybar råvara",def:"Kan växa tillbaka inom rimlig tid. Ex: trä, bomull, biogas."},
      {term:"Icke-förnybar råvara",def:"Tar miljontals år att bilda. Ex: järnmalm, olja, koppar."},
      {term:"Återvinning",def:"Materialet bearbetas om till ny råvara. Ex: aluminiumburkar smälts om."},
      {term:"Återanvändning",def:"Föremålet används igen utan omvandling. Ex: secondhand-kläder."}
    ],
    matching:[
      {term:"Stål",def:"Legering – järn + kol"},
      {term:"Malm",def:"Bergart med utvinnbart mineral"},
      {term:"Trä",def:"Förnybar råvara"},
      {term:"Olja",def:"Icke-förnybar råvara"},
      {term:"Återanvändning",def:"Används igen utan omvandling"}
    ]
  }
};

const SURVIVAL_QUESTIONS=[
  {text:"Vad avgör vilket grundämne en atom tillhör?",options:["Antalet elektroner","Antalet neutroner","Antalet protoner","Atomens massa"],correct:2},
  {text:"Vilken av dessa är en kemisk förening?",options:["O₂","Fe","H₂O","Au"],correct:2},
  {text:"Vad bildas vid fotosyntes?",options:["CO₂ och H₂O","Socker och O₂","O₂ och kol","Socker och CO₂"],correct:1},
  {text:"Vad är en legering?",options:["Ett grundämne","En blandning av metaller","En kemisk förening","En sorts malm"],correct:1},
  {text:"Vad händer med atomerna vid en kemisk reaktion?",options:["De försvinner","De delas","De ordnas om","De byts ut"],correct:2},
  {text:"Varför är fossila bränslen ett klimatproblem?",options:["De tar slut","De frigör gammalt bundet kol snabbt","De innehåller inga atomer","De är förnybara"],correct:1},
  {text:"Vad är malm?",options:["En metall","En legering","Bergart med utvinnbart mineral","Ett grundämne"],correct:2},
  {text:"Skillnad mellan återvinning och återanvändning?",options:["Ingen skillnad","Återvinning bearbetar materialet, återanvändning inte","Återanvändning kräver mer energi","Återvinning är dyrare"],correct:1},
  {text:"Vilket är ett grundämne?",options:["Vatten","Salt","Koldioxid","Järn (Fe)"],correct:3},
  {text:"Vad kräver fotosyntes?",options:["O₂, socker och ljus","CO₂, H₂O och ljus","CO₂, O₂ och värme","H₂O och mörker"],correct:1},
  {text:"Vad är en förnybar råvara?",options:["Järnmalm","Olja","Koppar","Trä"],correct:3},
  {text:"Hur mycket energi kräver återvinning av aluminium jämfört med ny utvinning?",options:["Lika mycket","Ca 50%","Ca 5%","Ca 80%"],correct:2}
];

let studentCode='',currentQuizKey=null,qIdx=0,wrongs=[],answers=[],currentSelected=null;
let fcIdx=0,retryIdx=0,retryList=[];
let _stI=null,_stV=null,_sdI=null,_sdV=null,matchedPairs=[];
let svStreak=0,svEliminated=false,svQList=[],svQIdx=0,svAnswered=false;
let localDone={};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function enterApp(){
  const sc=document.getElementById('codeInput').value.trim().toUpperCase();
  document.getElementById('codeErr').textContent='';
  if(!sc){document.getElementById('codeErr').textContent='Ange ditt kodord.';return;}
  studentCode=sc;showScreen('hubScreen');renderHub();
}
function renderHub(){
  document.getElementById('hubName').textContent=studentCode;
  const keys=Object.keys(QUIZZES);
  const allDone=keys.every(k=>localDone[k]);
  document.getElementById('progressPills').innerHTML=
    keys.map(k=>`<span class="step-pill ${localDone[k]?'done':'active'}">${localDone[k]?'✓ ':''} ${QUIZZES[k].title}</span>`).join('')+
    `<span class="step-pill ${allDone?'active':''}" style="${allDone?'':'opacity:.4'}">Survival</span>`;
  let html='';
  for(const key of keys){
    html+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
      <div><div style="font-weight:600;font-size:15px">${QUIZZES[key].title}</div>
      <div class="muted">${localDone[key]?'Klar – öva vidare':'Quiz ej gjort'}</div></div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        ${localDone[key]?`<button onclick="openPractice('${key}')" style="font-size:13px">Öva</button>`:''}
        <button class="primary" onclick="startQuiz('${key}')" style="font-size:13px">${localDone[key]?'Gör igen':'Starta quiz'}</button>
      </div></div>`;
  }
  html+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;${allDone?'':'opacity:.5'}">
    <div><div style="font-weight:600;font-size:15px">Survival</div>
    <div class="muted">${allDone?'Alla quiz klara – dags att tävla!':'Gör alla tre quiz först'}</div></div>
    <button class="primary" onclick="initSurvival()" style="font-size:13px" ${allDone?'':'disabled'}>Starta</button>
  </div>`;
  document.getElementById('hubButtons').innerHTML=html;
}
function startQuiz(key){currentQuizKey=key;qIdx=0;wrongs=[];answers=[];currentSelected=null;showScreen('quizScreen');renderQ();}
function openPractice(key){currentQuizKey=key;document.getElementById('practiceLabel').textContent=QUIZZES[key].title;showScreen('practiceScreen');showPractice('flash');}
function goHub(){showScreen('hubScreen');renderHub();}
function renderQ(){
  const quiz=QUIZZES[currentQuizKey],q=quiz.questions[qIdx],total=quiz.questions.length;
  document.getElementById('qSubject').textContent=quiz.subject+' · '+quiz.title;
  document.getElementById('qProgress').style.width=Math.round((qIdx/total)*100)+'%';
  document.getElementById('qNum').textContent='Fråga '+(qIdx+1)+' av '+total;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('qFeedback').className='feedback';
  document.getElementById('submitBtn').style.display='';
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('nextBtn').style.display='none';
  currentSelected=null;
  const area=document.getElementById('qArea');
  if(q.type==='multi'){
    area.innerHTML=q.options.map((o,i)=>`<button class="option" onclick="selOpt(${i})"><span class="dot"></span><span>${o}</span></button>`).join('');
  } else {
    area.innerHTML=`<textarea id="openAns" placeholder="Skriv ditt svar här..."></textarea>`;
  }
}
function selOpt(i){currentSelected=i;document.querySelectorAll('.option').forEach((b,idx)=>b.classList.toggle('selected',idx===i));}
function submitQ(){
  const quiz=QUIZZES[currentQuizKey],q=quiz.questions[qIdx];
  const fb=document.getElementById('qFeedback');
  document.getElementById('submitBtn').disabled=true;
  if(q.type==='multi'){
    if(currentSelected===null){document.getElementById('submitBtn').disabled=false;return;}
    const ok=currentSelected===q.correct;
    document.querySelectorAll('.option').forEach((b,i)=>{b.onclick=null;if(i===q.correct)b.classList.add('correct');else if(i===currentSelected&&!ok)b.classList.add('wrong');});
    fb.className='feedback show '+(ok?'ok':'bad');fb.textContent=ok?q.feedback_ok:q.feedback_bad;
    answers[qIdx]={ok};if(!ok)wrongs.push(qIdx);
  } else {
    const txt=document.getElementById('openAns')?.value.trim();
    if(!txt){document.getElementById('submitBtn').disabled=false;return;}
    document.getElementById('openAns').disabled=true;
    fb.className='feedback show ok';fb.innerHTML='<strong>Facit:</strong> '+q.facit;
    answers[qIdx]={ok:null,answer:txt};
  }
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='';
  document.getElementById('nextBtn').textContent=qIdx>=quiz.questions.length-1?'Se resultat':'Nästa';
}
function nextQ(){qIdx++;if(qIdx>=QUIZZES[currentQuizKey].questions.length)finishQuiz();else renderQ();}
function finishQuiz(){
  const scored=answers.filter(a=>a&&a.ok!==null);
  const correct=scored.filter(a=>a.ok).length;
  const pct=scored.length?Math.round(correct/scored.length*100):null;
  localDone[currentQuizKey]=true;
  openPractice(currentQuizKey);
  const banner=document.createElement('div');
  banner.className='feedback show ok';banner.style.marginBottom='1rem';
  banner.innerHTML=pct!==null?`<strong>${correct}/${scored.length} rätt (${pct}%)</strong> – bra jobbat! Öva vidare nedan.`:'<strong>Klart!</strong> Öva vidare nedan.';
  document.getElementById('practiceArea').prepend(banner);
}
function showPractice(mode){
  document.querySelectorAll('#practiceScreen .stab').forEach(b=>b.classList.remove('active'));
  const idx=['flash','match','retry'].indexOf(mode);
  if(idx>-1)document.querySelectorAll('#practiceScreen .stab')[idx].classList.add('active');
  const area=document.getElementById('practiceArea');
  if(mode==='flash')renderFlash(area);else if(mode==='match')renderMatch(area);else renderRetry(area);
}
function renderFlash(area){fcIdx=0;renderFlashCard(area);}
function renderFlashCard(area){
  const cards=QUIZZES[currentQuizKey].flashcards,c=cards[fcIdx];
  area.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <button onclick="fcMove(-1)" ${fcIdx===0?'disabled':''}>Föregående</button>
    <span class="muted">${fcIdx+1} / ${cards.length}</span>
    <button onclick="fcMove(1)" ${fcIdx===cards.length-1?'disabled':''}>Nästa</button></div>
    <div class="flashcard" onclick="this.classList.toggle('flipped')"><div class="flashcard-inner">
      <div class="fc-front">${c.term}</div><div class="fc-back">${c.def}</div>
    </div></div>
    <p class="muted" style="text-align:center;font-size:13px">Klicka för att vända</p>`;
}
function fcMove(dir){fcIdx+=dir;renderFlashCard(document.getElementById('practiceArea'));}
function renderMatch(area){
  _stI=null;_stV=null;_sdI=null;_sdV=null;matchedPairs=[];
  const pairs=[...QUIZZES[currentQuizKey].matching].sort(()=>Math.random()-.5);
  const defs=[...QUIZZES[currentQuizKey].matching].map(p=>p.def).sort(()=>Math.random()-.5);
  area.innerHTML=`<div class="match-cols">
    <div id="matchTerms">${pairs.map((p,i)=>`<div class="match-item" id="mt${i}" onclick="selTerm(${i},'${esc(p.term)}')">${p.term}</div>`).join('')}</div>
    <div id="matchDefs">${defs.map((d,i)=>`<div class="match-item" id="md${i}" onclick="selDef(${i},'${esc(d)}')">${d}</div>`).join('')}</div>
  </div><div id="matchMsg" style="margin-top:1rem;font-size:14px"></div>`;
}
function esc(s){return s.replace(/'/g,"\\'");}
function selTerm(i,val){if(document.getElementById('mt'+i).classList.contains('matched'))return;_stI=i;_stV=val;document.querySelectorAll('[id^=mt]').forEach(el=>el.classList.remove('sel'));document.getElementById('mt'+i).classList.add('sel');tryMatchPair();}
function selDef(i,val){if(document.getElementById('md'+i).classList.contains('matched'))return;_sdI=i;_sdV=val;document.querySelectorAll('[id^=md]').forEach(el=>el.classList.remove('sel'));document.getElementById('md'+i).classList.add('sel');tryMatchPair();}
function tryMatchPair(){
  if(_stI===null||_sdI===null)return;
  const ok=QUIZZES[currentQuizKey].matching.find(p=>p.term===_stV&&p.def===_sdV);
  if(ok){
    document.getElementById('mt'+_stI).classList.replace('sel','matched');
    document.getElementById('md'+_sdI).classList.replace('sel','matched');
    matchedPairs.push(_stV);
    if(matchedPairs.length===QUIZZES[currentQuizKey].matching.length){const m=document.getElementById('matchMsg');m.textContent='Perfekt! Alla rätt.';m.style.color='#166534';}
  } else {
    const ti=_stI,di=_sdI;
    document.getElementById('mt'+ti).classList.add('wrong-flash');document.getElementById('md'+di).classList.add('wrong-flash');
    setTimeout(()=>{document.getElementById('mt'+ti)?.classList.remove('wrong-flash','sel');document.getElementById('md'+di)?.classList.remove('wrong-flash','sel');},600);
  }
  _stI=null;_stV=null;_sdI=null;_sdV=null;
}
function renderRetry(area){
  retryList=wrongs.length?[...wrongs]:QUIZZES[currentQuizKey].questions.map((_,i)=>i);retryIdx=0;
  if(!wrongs.length){area.innerHTML=`<div class="card" style="text-align:center;padding:1.5rem"><p style="font-weight:600;margin-bottom:.25rem">Inga fel!</p><p class="muted">Du svarade rätt på alla flervalsfrågor.</p></div>`;return;}
  renderRetryQ(area);
}
function renderRetryQ(area){
  if(retryIdx>=retryList.length){area.innerHTML=`<div class="card" style="text-align:center;padding:1.5rem;font-weight:600">Övningen klar!</div>`;return;}
  const q=QUIZZES[currentQuizKey].questions[retryList[retryIdx]];
  const shuffled=[...q.options].map((o,i)=>({o,orig:i})).sort(()=>Math.random()-.5);
  const newCorrect=shuffled.findIndex(x=>x.orig===q.correct);
  area.innerHTML=`<div class="muted" style="margin-bottom:.75rem">Öva på felen · ${retryIdx+1} / ${retryList.length}</div>
    <h3>${q.text}</h3>
    <div id="retryOpts" style="margin-top:1rem">${shuffled.map((x,i)=>`<button class="option" onclick="checkRetry(${i},${newCorrect})"><span class="dot"></span><span>${x.o}</span></button>`).join('')}</div>
    <div class="feedback" id="retryFb"></div>`;
}
function checkRetry(i,correct){
  const area=document.getElementById('practiceArea');
  const btns=document.querySelectorAll('#retryOpts .option');btns.forEach(b=>b.onclick=null);
  const ok=i===correct;btns[correct].classList.add('correct');if(!ok)btns[i].classList.add('wrong');
  const fb=document.getElementById('retryFb');fb.className='feedback show '+(ok?'ok':'bad');fb.textContent=ok?'Rätt!':'Fel, se det markerade svaret.';
  const btn=document.createElement('button');btn.className='primary';btn.style.marginTop='1rem';
  btn.textContent=retryIdx<retryList.length-1?'Nästa':'Klar';btn.onclick=()=>{retryIdx++;renderRetryQ(area);};area.appendChild(btn);
}
function initSurvival(){
  svStreak=0;svEliminated=false;svAnswered=false;
  svQList=[...SURVIVAL_QUESTIONS].sort(()=>Math.random()-.5);svQIdx=0;
  showScreen('survivalScreen');renderSurvivalQ();
}
function renderSurvivalQ(){
  if(svQIdx>=svQList.length){endSurvival(true);return;}
  const q=svQList[svQIdx];svAnswered=false;
  document.getElementById('svContent').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div class="label">Survival · fråga ${svQIdx+1}</div>
      <div style="font-size:13px;color:#dc2626">♥ ett liv</div></div>
    <div style="font-size:19px;font-weight:600;text-align:center;margin:1rem 0;line-height:1.4">${q.text}</div>
    <div id="svOpts">${q.options.map((o,i)=>`<button class="option" onclick="svAnswer(${i})"><span class="dot"></span><span>${o}</span></button>`).join('')}</div>
    <div class="feedback" id="svFb"></div>`;
}
function svAnswer(i){
  if(svAnswered)return;svAnswered=true;
  const q=svQList[svQIdx],ok=i===q.correct;
  document.querySelectorAll('#svOpts .option').forEach((b,idx)=>{b.onclick=null;if(idx===q.correct)b.classList.add('correct');else if(idx===i&&!ok)b.classList.add('wrong');});
  const fb=document.getElementById('svFb');
  if(ok){svStreak++;fb.className='feedback show ok';fb.textContent='Rätt! Nästa fråga...';setTimeout(()=>{svQIdx++;renderSurvivalQ();},1200);}
  else{svEliminated=true;fb.className='feedback show bad';fb.textContent='Fel! Du är ute. Rätt i rad: '+svStreak+'.';setTimeout(()=>endSurvival(false),1500);}
}
function endSurvival(won){
  document.getElementById('svContent').innerHTML=`<div style="text-align:center;padding:2.5rem 0">
    <div style="font-size:48px;margin-bottom:.5rem">${won?'★':'✕'}</div>
    <h2 style="margin-bottom:.25rem">${won?'Du klarade alla frågor!':'Du är ute!'}</h2>
    <p class="muted" style="margin-bottom:1.5rem">Rätt i rad: <strong>${svStreak}</strong></p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="primary" onclick="initSurvival()">Spela igen</button>
      <button onclick="goHub()">Tillbaka</button>
    </div></div>`;
}
</script>
</body>
</html>
